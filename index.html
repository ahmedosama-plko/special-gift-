<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى إنسانة</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
        .heart { color: red; font-size: 60px; animation: pulse 1s infinite; margin: 20px 0; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .photos img { width: 90%; max-width: 350px; border-radius: 20px; border: 3px solid #ff69b4; box-shadow: 0 0 15px #ff69b4; margin: 10px; }
        .timer { font-size: 22px; color: #ff69b4; border: 2px solid #ff69b4; display: inline-block; padding: 20px; border-radius: 15px; background: #1a1a1a; margin: 20px 0; }
        h1 { font-size: 26px; color: #ff69b4; text-shadow: 2px 2px 5px #000; }
        p { font-size: 18px; line-height: 1.6; padding: 0 10px; }
        audio { margin-top: 20px; width: 80%; height: 30px; }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <h1>كل ثانية وأنتِ معايا هي أحلى ذكرى</h1>
    
    <audio controls autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="photos">
        <img src="1.jpg" alt="Our Memory">
        <img src="2.jpg" alt="Our Memory">
    </div>

    <div class="timer" id="timer">بيحسب الوقت...</div>

    <p>ربنا يخليكي ليا وما يحرمنيش منك أبداً يا أغلى حاجة في حياتي.. وجودك هو اللي مخلي للأيام طعم.</p>

    <script>
        function updateTimer() {
            // غير التاريخ ده لتاريخ أول يوم ليكم سوا (السنة-الشهر-اليوم)
            const start = new Date("2026-01-25T00:00:00"); 
            const now = new Date();
            const diff = now - start;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            
            document.getElementById("timer").innerHTML = 
                `بقالنا مع بعض:<br><b>${days}</b> يوم و <b>${hours}</b> ساعة<br>و <b>${mins}</b> دقيقة و <b>${secs}</b> ثانية`;
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
