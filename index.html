<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا ❤️</title>
    <style>
        /* تصميم الصفحة */
        body { 
            background-color: #0d0d0d; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        /* حرك القلب */
        .heart { 
            color: #ff4d94; 
            font-size: 70px; 
            animation: pulse 1.2s infinite; 
            margin-bottom: 20px;
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.3); } 
            100% { transform: scale(1); } 
        }

        h1 { 
            color: #ff4d94; 
            font-size: 26px; 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px rgba(255, 77, 148, 0.5);
        }

        /* صندوق العداد */
        .timer-container { 
            background: rgba(255, 77, 148, 0.1); 
            border: 2px solid #ff4d94; 
            padding: 30px 20px; 
            border-radius: 25px; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.2);
        }

        .timer-label { 
            font-size: 20px; 
            margin-bottom: 15px; 
            color: #ffb3d1; 
        }

        #timer { 
            font-size: 24px; 
            font-weight: bold; 
            line-height: 1.6; 
            color: #fff;
        }

        .footer-msg { 
            margin-top: 40px; 
            font-size: 18px;
            color: #ffb3d1;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <h1>كل ثانية وأنتي معايا هي أحلى ذكرى</h1>

    <div class="timer-container">
        <div class="timer-label">بقالنا مع بعض:</div>
        <div id="timer">بيتم الحساب...</div>
    </div>

    <div class="footer-msg">ربنا يخليكي ليا وما يحرمنيش منك أبداً يا أغلى حاجة في حياتي</div>

    <script>
        // التاريخ بتاعكم: 25 يناير 2026
        // في البرمجة شهر 1 بيتكتب رقم 0
        const startDate = new Date(2026, 0, 25, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            // لو التاريخ لسه مجاش
            if (diff < 0) {
                document.getElementById('timer').innerHTML = "العد التنازلي بدأ.. قربنا ❤️";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                days + " يوم <br>" + 
                hours + " ساعة، " + 
                minutes + " دقيقة، " + 
                seconds + " ثانية";
        }

        // تحديث كل ثانية
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
